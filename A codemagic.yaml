workflows:
  android-workflow:
    name: LG Player Build
    max_build_duration: 30
    environment:
      flutter: stable
      android_sdk: 33
    scripts:
      - name: Setup Project
        script: | 
          flutter create . --platforms android --org com.lgplayer.app
      - name: Get Dependencies
        script: |
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

