workflows:
  android-workflow:
    name: LG Player Build
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Setup Project
        script: | 
          flutter create . --platforms android --org com.lgplayer.app
      - name: Get Dependencies
        script: |
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      
